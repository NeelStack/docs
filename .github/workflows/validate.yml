name: Validate & Lint Documentation

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean remaining legacy files
        run: python3 clean_remaining.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Run markdownlint
        run: markdownlint-cli2 "**/*.md" "#node_modules"

  link-check:
    name: Internal Link Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean remaining legacy files
        run: python3 clean_remaining.py

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'no'
          config-file: '.github/mlc_config.json'
          folder-path: 'engineering-system, product-docs'

  spell-check:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean remaining legacy files
        run: python3 clean_remaining.py

      - name: Run CSpell
        uses: streetsidesoftware/cspell-action@v5
        with:
          config: "cspell.json"

  validate-structure:
    name: Validate Document Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean remaining legacy files
        run: python3 clean_remaining.py

      - name: Check YAML frontmatter on NES-2xx+ documents
        run: python3 validate_structure.py
